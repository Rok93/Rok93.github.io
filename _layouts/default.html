<!doctype html>
<html lang="{{ site.lang | default: 'ko' }}" data-skin="hyde">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <!-- 웹폰트: Pretendard(본문) / Gowun Batang(Custom 제목) / JetBrains Mono(코드) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
  <script>
    /* FOUC 방지: CSS 적용 전에 저장된 스킨/밝기를 미리 설정 */
    (function(){try{
      var s=localStorage.getItem('rok93-skin'); if(s){document.documentElement.dataset.skin=s;}
      var t=localStorage.getItem('rok93-theme'); if(t){document.documentElement.dataset.theme=t;}
    }catch(e){}})();
  </script>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <p class="site-tagline">{{ site.description }}</p>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </nav>
      <div class="sidebar-foot">© {{ site.time | date: '%Y' }} {{ site.author }}</div>
    </div>
  </aside>

  <main class="content">
    <div class="toggles">
      <button class="theme-toggle" type="button" aria-label="밝기 전환"><span class="theme-name">☀️</span></button>
      <button class="skin-toggle" type="button" aria-label="테마 전환">테마 · <span class="skin-name">Hyde</span></button>
    </div>
    <div class="content-inner">
      {{ content }}
    </div>
  </main>

  <script>
    (function(){
      var root=document.documentElement;
      /* 스킨 토글 (Hyde ↔ Custom) */
      var sBtn=document.querySelector('.skin-toggle'), sName=sBtn&&sBtn.querySelector('.skin-name');
      var sOrder=['hyde','custom'], sLabel={hyde:'Hyde',custom:'Custom'};
      function sRender(){var s=root.dataset.skin||'hyde';if(sName)sName.textContent=sLabel[s]||s;}
      sRender();
      if(sBtn){sBtn.addEventListener('click',function(){
        var cur=root.dataset.skin||'hyde', next=sOrder[(sOrder.indexOf(cur)+1)%sOrder.length];
        root.dataset.skin=next; try{localStorage.setItem('rok93-skin',next);}catch(e){}
        sRender();
      });}
      /* 밝기 토글 (Light ↔ Dark), 기본은 OS 설정 */
      var tBtn=document.querySelector('.theme-toggle'), tName=tBtn&&tBtn.querySelector('.theme-name');
      function effTheme(){
        return root.dataset.theme || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      }
      function tRender(){if(tName)tName.textContent=effTheme()==='dark'?'🌙':'☀️';}
      tRender();
      if(tBtn){tBtn.addEventListener('click',function(){
        var next=effTheme()==='dark'?'light':'dark';
        root.dataset.theme=next; try{localStorage.setItem('rok93-theme',next);}catch(e){}
        tRender();
        /* 댓글(utterances) 테마도 함께 전환 */
        var uf=document.querySelector('.utterances-frame');
        if(uf){uf.contentWindow.postMessage({type:'set-theme',theme:next==='dark'?'github-dark':'github-light'},'https://utteranc.es');}
      });}
    })();
  </script>
</body>
</html>
